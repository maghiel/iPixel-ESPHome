number:
  # Show a saved slot
  - platform: template
    name: "Show slot"
    id: show_slot
    icon: "mdi:movie-open-outline"
    optimistic: true
    min_value: 1
    max_value: 10
    initial_value: 1
    step: 1
    on_value:
      - ble_client.ble_write:
          id: ble_matrix
          service_uuid: '00FA'
          characteristic_uuid: '0000FA02-0000-1000-8000-00805F9B34FB'
          value: !lambda |-
            uint8_t b = (uint8_t) round(x);
            std::vector<uint8_t> command = {0x07, 0x00, 0x08, 0x80, 0x01, 0x00, b & 0xFF};
            return command;
